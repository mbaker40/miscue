name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # v2 preview: if the v2 branch exists, build its v2/ subproject into dist/v2
      # so the single Pages artifact serves v1 at /miscue/ and v2 at /miscue/v2/.
      - name: Check for v2 branch
        id: v2check
        run: |
          if git ls-remote --exit-code --heads origin v2 >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.v2check.outputs.exists == 'true'
        with:
          ref: v2
          path: v2ck
      - name: Build v2 preview
        if: steps.v2check.outputs.exists == 'true'
        working-directory: v2ck/v2
        run: |
          npm ci
          npm run build
      - name: Merge v2 into Pages artifact
        if: steps.v2check.outputs.exists == 'true'
        run: |
          mkdir -p dist/v2
          cp -r v2ck/v2/dist/. dist/v2/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # ground truth: what does the PUBLIC url actually serve right after deploy?
  # (the dev sandbox can't reach github.io, so this is the only automated probe)
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Probe live v2 preview
        run: |
          sleep 20
          for path in "miscue/" "miscue/v2/"; do
            echo "===== https://mbaker40.github.io/$path ====="
            curl -sS --max-time 20 "https://mbaker40.github.io/$path?ci=${{ github.run_id }}" -o page.html \
              -w "HTTP %{http_code}  bytes %{size_download}\n" || true
            echo "--- script bundles referenced ---"
            grep -o 'assets/[A-Za-z0-9_-]*\.js' page.html | sort -u || true
            echo "--- title ---"
            grep -o '<title>[^<]*</title>' page.html || true
          done
